<!DOCTYPE html>
<html>
<head>
<title>Final Surprise</title>

<style>
body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
font-family:Arial;
color:white;
}

h1{
font-size:50px;
margin-top:80px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 40px yellow;}
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<h1>🎂 Happy 15th Birthday 🎂</h1>

<h2>11 May 2011</h2>

<p style="font-size:20px;width:70%;margin:auto;">
You make the world brighter just by being in it.  
I hope your birthday is as wonderful and special as you are.
</p>

<br><br>

<button onclick="playSong()">Play Birthday Song 🎵</button>

<audio id="song">
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
function playSong(){
document.getElementById("song").play();
}
</script>

</body>
</html>
